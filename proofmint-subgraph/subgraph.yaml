specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: Crowdsale
    network: sepolia
    source:
      address: "0xF763Dc849e86f41A8339FB4aF49B71AeB35b4F21"
      abi: Crowdsale
      startBlock: 10467022
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - ReceiptMinted
        - TokensPurchased
        - Withdrawn
      abis:
        - name: Crowdsale
          file: ./abis/Crowdsale.json
      eventHandlers:
        - event: ReceiptMinted(indexed address,indexed uint256,uint256,uint256)
          handler: handleReceiptMinted
        - event: TokensPurchased(indexed address,uint256,uint256)
          handler: handleTokensPurchased
        - event: Withdrawn(indexed address,uint256)
          handler: handleWithdrawn
      file: ./src/crowdsale.ts
