type Buyer @entity(immutable: false) {
  id: ID!
  totalSpent: BigInt!
  totalTokens: BigInt!
  purchaseCount: Int!
  receiptCount: Int!
  purchases: [Purchase!]! @derivedFrom(field: "buyer")
  receipts: [ReceiptNFT!]! @derivedFrom(field: "owner")
}

type Purchase @entity(immutable: true) {
  id: ID!
  buyer: Buyer!
  amountETH: BigInt!
  tokensReceived: BigInt!
  timestamp: BigInt!
  txHash: Bytes!
}

type ReceiptNFT @entity(immutable: true) {
  id: ID!
  owner: Buyer!
  tokenId: BigInt!
  amountETH: BigInt!
  tokensReceived: BigInt!
  mintedAt: BigInt!
  txHash: Bytes!
}

type GlobalStat @entity(immutable: false) {
  id: ID!
  totalRaised: BigInt!
  totalTokensSold: BigInt!
  totalBuyers: Int!
  totalPurchases: Int!
  totalReceipts: Int!
  totalWithdrawn: BigInt!
}
